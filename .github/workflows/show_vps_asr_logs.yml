name: Show VPS ASR Logs

on:
  workflow_dispatch:
    inputs:
      tail_lines:
        description: "Number of log lines per launcher/container"
        required: true
        type: string
        default: "100"

      include_stopped:
        description: "Include stopped ASR containers?"
        required: true
        type: boolean
        default: true

jobs:
  show-logs:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Show VPS launcher and container logs
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          TAIL_LINES: ${{ inputs.tail_lines }}
          INCLUDE_STOPPED: ${{ inputs.include_stopped }}
        run: |
          ssh -i ~/.ssh/vps_key "${VPS_USER}@${VPS_HOST}" \
            "TAIL_LINES='${TAIL_LINES}' INCLUDE_STOPPED='${INCLUDE_STOPPED}' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          APP_DIR="/opt/asr-gcp-uploader"

          echo "============================================================"
          echo "VPS launcher processes"
          echo "============================================================"
          ps aux | grep "start_vps_containers_from_urls" | grep -v grep || true

          echo ""
          echo "============================================================"
          echo "Recent VPS launcher logs"
          echo "============================================================"

          if [ -d "${APP_DIR}/logs" ]; then
            echo "Available launcher logs:"
            ls -lt "${APP_DIR}/logs"/vps-launch-*.log 2>/dev/null | head -n 10 || true

            LATEST_LAUNCH_LOG=$(ls -t "${APP_DIR}/logs"/vps-launch-*.log 2>/dev/null | head -n 1 || true)

            if [ -n "${LATEST_LAUNCH_LOG}" ]; then
              echo ""
              echo "Latest launcher log: ${LATEST_LAUNCH_LOG}"
              echo "------------------------------------------------------------"
              tail -n "${TAIL_LINES}" "${LATEST_LAUNCH_LOG}" || true
            else
              echo "No launcher logs found."
            fi
          else
            echo "Logs directory not found: ${APP_DIR}/logs"
          fi

          echo ""
          echo "============================================================"
          echo "ASR container status"
          echo "============================================================"

          if [ "${INCLUDE_STOPPED}" = "true" ]; then
            docker ps -a --filter "label=asr-uploader=true" || true
            CONTAINERS=$(docker ps -a --filter "label=asr-uploader=true" --format "{{.Names}}" || true)
          else
            docker ps --filter "label=asr-uploader=true" || true
            CONTAINERS=$(docker ps --filter "label=asr-uploader=true" --format "{{.Names}}" || true)
          fi

          if [ -z "${CONTAINERS}" ]; then
            echo "No ASR containers found."
            exit 0
          fi

          for container in ${CONTAINERS}; do
            echo ""
            echo "============================================================"
            echo "Inspecting container: ${container}"
            echo "============================================================"

            docker inspect \
              --format='Name={{.Name}} Status={{.State.Status}} ExitCode={{.State.ExitCode}} Started={{.State.StartedAt}} Finished={{.State.FinishedAt}}' \
              "${container}" || true

            echo ""
            echo "Logs for container: ${container}"
            echo "------------------------------------------------------------"
            docker logs --tail "${TAIL_LINES}" "${container}" || true
          done

          echo ""
          echo "============================================================"
          echo "Checkpoint files"
          echo "============================================================"
          find "${APP_DIR}/output" -name checkpoint.json -print 2>/dev/null || true
          REMOTE_SCRIPT