defaults:
  dataset_name: ai4bharat/IndicVoices
  split: train
  local_output_dir: output

  # Requested settings
  job_parallelism: 1
  workers: 2
  batch_size: 128
  query_batch_size: 128
  max_prefetch_batches: 5
  query_qps: 30
  upload_qps: 30

  gcs_timeout_seconds: 120
  skip_if_exists: true

  # Upload checkpoint/manifest backup to GCS every 5 completed local batches.
  upload_state_to_gcs_every_batches: 5

  # -1 means process full dataset/config.
  limit: -1

