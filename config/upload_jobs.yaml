defaults:
  dataset_name: ai4bharat/IndicVoices
  split: train
  local_output_dir: output

  # Requested settings
  workers: 3
  batch_size: 128
  upload_qps: 30

  gcs_timeout_seconds: 120
  skip_if_exists: true

  # Upload checkpoint/manifest backup to GCS every 5 completed local batches.
  upload_state_to_gcs_every_batches: 5

  # -1 means process full dataset/config.
  limit: -1

jobs:
  - url: https://huggingface.co/datasets/ai4bharat/IndicVoices/viewer/assamese
    dataset_config: assamese
    run_name: ai4bharat_indicvoices_assamese_valid

  - url: https://huggingface.co/datasets/ai4bharat/IndicVoices/viewer/bengali
    dataset_config: bengali
    run_name: ai4bharat_indicvoices_bengali_valid

  - url: https://huggingface.co/datasets/ai4bharat/IndicVoices/viewer/bodo
    dataset_config: bodo
    run_name: ai4bharat_indicvoices_bodo_valid

  - url: https://huggingface.co/datasets/ai4bharat/IndicVoices/viewer/dogri
    dataset_config: dogri
    run_name: ai4bharat_indicvoices_dogri_valid

  - url: https://huggingface.co/datasets/ai4bharat/IndicVoices/viewer/gujarati
    dataset_config: gujarati
    run_name: ai4bharat_indicvoices_gujarati_valid

  - url: https://huggingface.co/datasets/ai4bharat/IndicVoices/viewer/hindi
